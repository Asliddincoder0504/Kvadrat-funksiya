<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kvadrat Tenglama Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #ff4b5c;
        }
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
        }
        #math-bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(15, 12, 41, 0.78);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            margin: 1.5rem auto;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        h1 {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0,212,255,0.4);
            font-size: clamp(1.9rem, 7vw, 2.8rem);
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin-bottom: 1.8rem;
        }
        .input-group {
            flex: 1;
            min-width: 140px;
            max-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.9);
        }
        input {
            width: 100%;
            padding: 0.9rem;
            font-size: 1.15rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,212,255,0.45);
            color: white;
            border-radius: 10px;
            text-align: center;
            transition: 0.25s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.3);
            background: rgba(255,255,255,0.12);
            outline: none;
        }
        .btn-calculate {
            background: linear-gradient(90deg, var(--primary), #0099cc);
            border: none;
            padding: 0.95rem;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 1.5rem;
            display: block;
            transition: all 0.3s;
        }
        .btn-calculate:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,212,255,0.5);
        }
        .error {
            color: var(--accent);
            font-weight: 500;
            text-align: center;
            margin: 1rem 0;
            font-size: 1.1rem;
        }
        .steps {
            background: rgba(0,0,0,0.4);
            border-left: 5px solid var(--primary);
            padding: 1.3rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            line-height: 1.65;
            font-size: 1.02rem;
        }
        code {
            background: #1e1e2e;
            color: #f1c40f;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
        }
        .graph-container {
            text-align: center;
            margin-top: 2rem;
        }
        .graph {
            max-width: 100%;
            height: auto;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            background: #1e1e2e;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
        }
        .btn-download {
            margin-top: 1.2rem;
            font-size: 1.05rem;
        }
        @media (max-width: 576px) {
            .container { padding: 1.2rem; margin: 1rem; }
            .input-row { flex-direction: column; align-items: center; }
            .input-group { max-width: 260px; }
        }
    </style>
</head>
<body>

<canvas id="math-bg-canvas"></canvas>

<div class="container">
    <h1>Kvadrat Tenglama Calculator</h1>

    <form method="post">
        {% csrf_token %}
        <div class="input-row">
            <div class="input-group">
                <label>a =</label>
                {{ form.a }}
            </div>
            <div class="input-group">
                <label>b =</label>
                {{ form.b }}
            </div>
            <div class="input-group">
                <label>c =</label>
                {{ form.c }}
            </div>
        </div>

        <button type="submit" class="btn-calculate">Hisoblash va Grafikni Ko'rish</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if step_by_step %}
        <div class="steps">
            {{ step_by_step|safe }}
        </div>
    {% endif %}

    {% if graph %}
    <div class="graph-container">
        <h4 style="color: var(--primary); margin-bottom: 1rem;">Funksiya grafigi</h4>
        <img src="{{ graph }}" alt="Grafik" class="graph" id="math-graph">

        <button class="btn btn-outline-light btn-lg btn-download" onclick="downloadGraph()">
            <i class="bi bi-download me-2"></i> Grafikni yuklab olish (PNG)
        </button>
    </div>
    {% endif %}

    {% if saved_id %}
        <div class="alert alert-info text-center mt-4" style="background: rgba(0,212,255,0.15); border-color: var(--primary);">
            Yechim saqlandi!
            <a href="{% url 'history' %}" class="alert-link">Tarixni ko'rish</a>
        </div>
    {% endif %}
</div>

<script>
// === Jonli matematik formulalar fon ===
const formulas = [
    "f(x)=ax²+bx+c", "D=b²-4ac", "x=(-b±√D)/(2a)", "∫f(x)dx", "∑_{n=1}^∞",
    "e^{iπ}+1=0", "sin(x)=(e^{ix}-e^{-ix})/(2i)", "lim_{x→∞}", "∇·F=0",
    "x²+y²=r²", "det(A)", "λ eigenvector", "F=ma", "E=mc²"
];

const canvas = document.getElementById('math-bg-canvas');
const ctx = canvas.getContext('2d');
let width, height;

function resizeCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.text = formulas[Math.floor(Math.random() * formulas.length)];
        this.x = Math.random() * width;
        this.y = height + 80;
        this.speed = 0.5 + Math.random() * 1.4;
        this.size = 16 + Math.random() * 26;
        this.opacity = 0.12 + Math.random() * 0.32;
        this.angle = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.018;
    }
    update() {
        this.y -= this.speed;
        this.angle += this.rotSpeed;
        if (this.y < -120) this.reset();
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.font = `${this.size}px monospace`;
        ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`;
        ctx.textAlign = 'center';
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
    }
}

const particles = Array.from({length: 35}, () => new Particle());

function animate() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// === Grafik yuklab olish (mobil mos) ===
function downloadGraph() {
    const img = document.getElementById('math-graph');
    if (!img) {
        alert("Grafik hali yuklanmagan!");
        return;
    }

    const base64 = img.src.split(',')[1];
    const byteChars = atob(base64);
    const byteNums = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
        byteNums[i] = byteChars.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNums);
    const blob = new Blob([byteArray], {type: 'image/png'});

    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `kvadrat_grafik_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
